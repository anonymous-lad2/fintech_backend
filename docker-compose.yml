# ─────────────────────────────────────────────────────────────────────────────
# Finance Dashboard — Local Development Stack
#
# Services:
#   postgres   — PostgreSQL 16 database
#   api        — Spring Boot application
#
# Start:  docker compose up --build
# Stop:   docker compose down
# Reset DB: docker compose down -v  (removes the named volume)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: finance-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       finance_db
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"          # Expose for local DB tools (DBeaver, psql, etc.)
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d finance_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Spring Boot API ─────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finance-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Database
      DB_HOST:  postgres
      DB_PORT:  5432
      DB_NAME:  finance_db
      DB_USER:  postgres
      DB_PASS:  postgres

      # JWT — NEVER use this value in production; rotate immediately
      JWT_SECRET: dsaukdfnekurfjewirjr83jr8q3jukeanfkeniue3
      JWT_EXPIRY_SECONDS: 3600

      # Spring profile
      SPRING_PROFILES_ACTIVE: default

      # JVM timezone
      TZ: UTC
    depends_on:
      postgres:
        condition: service_healthy    # Wait for Postgres healthcheck to pass
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s              # Give Spring Boot time to start + run Flyway

volumes:
  pgdata:
    driver: local
    # Named volume persists data across container restarts.
    # Use `docker compose down -v` to wipe the database for a clean slate.
